<!DOCTYPE html>
<html>

<head>
    <title>Practice 3 — Password Verification</title>
</head>

<body>

<h1>EECS 348 Lab Three Practice Six</h1>

First Password:
<input id="pass1" type="password"><br><br>

Second Password:
<input id="pass2" type="password"><br><br>

<button onclick="validatePasswords()">
    Validate Your Passwords
</button>

<script>
function validatePasswords() {

    let p1 = document.getElementById("pass1").value;
    let p2 = document.getElementById("pass2").value;

    // Check length
    if (p1.length < 8) {
        alert("Password must be at least 8 characters long.");
        return;
    }

    // Check if passwords match
    if (p1 !== p2) {
        alert("Passwords do not match.");
        return;
    }

    // Success
    alert("Passwords match!");
}
</script>

</body>
</html>
